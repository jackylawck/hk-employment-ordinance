name: ⚖️ Cap. 57 JSON Database Integrity Test

on:
  push:
    branches: [ "main" ]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout Repository Code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🔍 Execute JSON Schema & Syntax Validation
      run: |
        python -c "
        import json, sys
        try:
            with open('cap57_db.json', 'r', encoding='utf-8') as f:
                data = json.load(f)
            print('✅ Success: Syntax is valid!')
            
            # AIGP 開發治理：強制稽核欄位完整性，防範 Functional Drift
            required_keys = ['keys', 'zh', 'en']
            sub_keys = ['title', 'statute', 'red_flag', 'gov_advice']
            
            for ch_id, ch_content in data.items():
                for r_key in required_keys:
                    assert r_key in ch_content, f'Missing base key: {r_key} in {ch_id}'
                for s_key in sub_keys:
                    assert s_key in ch_content['zh'], f'Missing zh value: {s_key} in {ch_id}'
                    assert s_key in ch_content['en'], f'Missing en value: {s_key} in {ch_id}'
            print('✅ Success: All strict statutory schema checks passed!')
        except Exception as e:
            print(f'❌ CRITICAL COMPLIANCE ERROR: {str(e)}', file=sys.stderr)
            sys.exit(1)
        "
